<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statistics</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link rel="stylesheet" href="./content/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    /* Custom styling to reduce spacing */
    .container-custom {
        padding-top: 0; /* Eliminate top padding */
        padding-bottom: 20px; /* Adjust the bottom padding as needed */
    }
    .header-custom {
        margin-top: 0; /* Eliminate top margin */
        margin-bottom: 10px; /* Reduce margin below the header */
    }
    .chart-size {
        width: 100% !important; /* Makes the chart width responsive */
        max-width: 500px; /* Maximum chart width */
        aspect-ratio: 1.6; /* Sets the width to height ratio, adjust as needed */
        margin: auto; /* Centers the chart if it's smaller than the parent container */
    }
    /* Ensure the <header> element does not contribute to the gap */
    header {
        margin-bottom: 0; /* Eliminate bottom margin */
        padding: 0; /* Eliminate padding */
    }
</style>

</head>
<body>

<header></header>

<div class="container container-custom">
    <div class="header header-custom">
        <h2>Harmony Hub Visitor Statistics 2024</h2>
    </div>
	<br/>
    <div class="header header-custom">
        <h3>Doughnut Chart</h2>
    </div>
    <canvas id="DoughnutChart" class="chart-size"></canvas>
	<br/><br/>
    <div class="header header-custom">
        <h3>Bar Chart</h2>
    </div>
	<canvas id="BarChart" class="chart-size"></canvas>
	<br/><br/>
	<div class="header header-custom">
        <h4>Multiple Lines Chart</h2>
    </div>
	<canvas id="MultipleLinesChart" class="chart-size"></canvas>

    <script>
	
    function renderChart(chartId, chartType, chartTitle, dataSets, options) {
        const ctx = document.getElementById(chartId).getContext('2d'); // Get the context of the canvas
        new Chart(ctx, {
            type: chartType,
            data: {
                labels: dataSets.labels,
                datasets: dataSets.datasets
            },
                options: {
                    title: {
                        display: true,
                        text: chartTitle
                    }
                }
            });
        }
		
    function fetchData() {
        fetch('./data/statistics.json')
            .then(response => response.json())
            .then(data => {
                const months = data.map(item => item.month);
                const visitors = data.map(item => item.visitors);
                const additionalVisitors = data.map(item => item.additionalVisitors);
                const colors = data.map(item => item.color);

                // Doughnut Chart
                renderChart("DoughnutChart", "doughnut", "Harmony Hub Visitor Statistics 2024 - Doughnut Chart", {
                    labels: months,
                    datasets: [{
                        backgroundColor: colors,
                        data: visitors
                    }]
                }, {});

                // Bar Chart
				renderChart("BarChart", "bar", "Harmony Hub Visitor Statistics 2024 - Bar Chart", {
					labels: months,
					datasets: [
						{
							label: "Visitors", // First dataset label
							backgroundColor: colors,
							data: visitors
						},
						{
							label: "Additional Visitors", // Second dataset label
							backgroundColor: "anotherColorArrayHere", // This should be another array of colors
							data: additionalVisitors
						}
					]
				}, {
					scales: {
						yAxes: [{ ticks: { beginAtZero: true } }],
						xAxes: [{ }]
					},
					legend: {
						display: true
					}
				});

                // Multiple Lines Chart
                const lineChartDataSets = [
                    {  label: "Visitors", 
					   data: visitors, 
					   borderColor: "#3e95cd", 
					   fill: false 
					},
                    {  label: "Additional Visitors", 
					   data: additionalVisitors, 
					   borderColor: "#8e5ea2", 
					   fill: false 
					}
                ];
                renderChart("MultipleLinesChart", "line", "Harmony Hub Visitor Statistics 2024 - Multiple Lines Charts", {
                    labels: months,
                    datasets: lineChartDataSets
                }, {
                    scales: {
                        yAxes: [{ ticks: { beginAtZero: true } }],
                        xAxes: [{ }]
                    }
                });
            })
            .catch(error => console.error('Error fetching data:', error));
    }

        // Call fetchData when the page loads
        window.onload = fetchData;
    </script>
	<br/><br/>
	<br/><br/>
</div>

<footer class="footer">
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="/contact">Contact</a>
</footer>

<script src="./node_modules/jquery/dist/jquery.min.js"></script>
<script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
<script src="./scripts/main.js"></script>
<script src="./scripts/statistics.ts"></script>

</body>
</html>
